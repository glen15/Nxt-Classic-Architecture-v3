<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-group input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #4a90d9;
    }

    .input-group button {
      padding: 12px 20px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-group button:hover { background: #3a7bc8; }
    .input-group button:disabled { background: #aaa; cursor: not-allowed; }

    .error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #eee;
      transition: box-shadow 0.2s;
    }

    .todo-item:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4a90d9;
    }

    .todo-item .title {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }

    .todo-item .title.completed {
      text-decoration: line-through;
      color: #999;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .todo-item .delete-btn:hover {
      color: #e53e3e;
      background: #fef2f2;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 40px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요" maxlength="200" />
      <button id="addBtn">추가</button>
    </div>
    <div id="error" class="error" style="display:none"></div>
    <ul id="todoList" class="todo-list"></ul>
    <p id="empty" class="empty" style="display:none">등록된 할 일이 없습니다.</p>
  </div>

  <script>
    const API_URL = "http://localhost:8080/api/todos";

    const todoInput = document.getElementById("todoInput");
    const addBtn = document.getElementById("addBtn");
    const todoList = document.getElementById("todoList");
    const errorEl = document.getElementById("error");
    const emptyEl = document.getElementById("empty");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
      setTimeout(() => { errorEl.style.display = "none"; }, 3000);
    }

    function renderTodos(todos) {
      todoList.innerHTML = "";
      emptyEl.style.display = todos.length === 0 ? "block" : "none";

      todos.forEach(function (todo) {
        var li = document.createElement("li");
        li.className = "todo-item";

        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = todo.completed;
        checkbox.addEventListener("change", function () { toggleTodo(todo.id, !todo.completed); });

        var title = document.createElement("span");
        title.className = "title" + (todo.completed ? " completed" : "");
        title.textContent = todo.title;
        title.addEventListener("click", function () { toggleTodo(todo.id, !todo.completed); });

        var deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "\u2715";
        deleteBtn.addEventListener("click", function () { deleteTodo(todo.id); });

        li.appendChild(checkbox);
        li.appendChild(title);
        li.appendChild(deleteBtn);
        todoList.appendChild(li);
      });
    }

    function fetchTodos() {
      fetch(API_URL)
        .then(function (res) { return res.json(); })
        .then(function (json) {
          if (json.success) { renderTodos(json.data); }
          else { showError(json.error || "조회 실패"); }
        })
        .catch(function () { showError("서버에 연결할 수 없습니다"); });
    }

    function addTodo() {
      var title = todoInput.value.trim();
      if (!title) return;

      addBtn.disabled = true;
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title }),
      })
        .then(function (res) { return res.json(); })
        .then(function (json) {
          if (json.success) {
            todoInput.value = "";
            fetchTodos();
          } else {
            showError(json.error || "추가 실패");
          }
        })
        .catch(function () { showError("서버에 연결할 수 없습니다"); })
        .finally(function () { addBtn.disabled = false; });
    }

    function toggleTodo(id, completed) {
      fetch(API_URL + "/" + id, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed: completed }),
      })
        .then(function (res) { return res.json(); })
        .then(function (json) {
          if (json.success) { fetchTodos(); }
          else { showError(json.error || "수정 실패"); }
        })
        .catch(function () { showError("서버에 연결할 수 없습니다"); });
    }

    function deleteTodo(id) {
      fetch(API_URL + "/" + id, { method: "DELETE" })
        .then(function (res) { return res.json(); })
        .then(function (json) {
          if (json.success) { fetchTodos(); }
          else { showError(json.error || "삭제 실패"); }
        })
        .catch(function () { showError("서버에 연결할 수 없습니다"); });
    }

    addBtn.addEventListener("click", addTodo);
    todoInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { addTodo(); }
    });

    fetchTodos();
  </script>
</body>
</html>
